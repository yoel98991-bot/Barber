<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F2F2F7">
  <title>AguaBol - Cliente Web</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <style>
    /* ========== iOS SYSTEM VARIABLES ========== */
    :root { 
      --tint: #0ea5e9; 
      --tint-hover: #0284c7; 
      --bg: #F2F2F7; 
      --card: #FFFFFF; 
      --text-main: #000000; 
      --text-muted: #8A8A8E; 
      --separator: #C6C6C8;
      --green: #34C759; 
      --gold: #FF9500;
      --radius-lg: 20px; 
      --radius-md: 14px; 
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
    html, body { width: 100%; height: 100dvh; overflow: hidden; background: var(--bg); color: var(--text-main); overscroll-behavior-y: none; }
    
    /* ========== ANIMACIONES ========== */
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ========== ONBOARDING / AUTH ========== */
    #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; transition: opacity 0.4s ease, transform 0.4s ease; }
    #auth-screen.hidden { opacity: 0; transform: scale(1.02); pointer-events: none; }
    .auth-card { width: 100%; max-width: 360px; text-align: center; }
    .auth-logo { margin-bottom: 24px; color: var(--tint); }
    .auth-title { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
    .auth-subtitle { font-size: 16px; color: var(--text-muted); margin-bottom: 32px; line-height: 1.4; }
    .auth-input { width: 100%; padding: 16px; background: white; border: none; border-radius: var(--radius-md); font-size: 17px; outline: none; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .auth-input:focus { box-shadow: 0 0 0 2px var(--tint); }
    #registro-campos { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
    #registro-campos.visible { max-height: 200px; opacity: 1; margin-top: 8px; }

    /* ========== APP PRINCIPAL ========== */
    #main-app { display: none; width: 100%; height: 100%; position: relative; }
    #main-app.visible { display: block; animation: fadeIn 0.4s; }
    
    .glass-header { position: absolute; top: 0; left: 0; right: 0; z-index: 50; padding: calc(env(safe-area-inset-top) + 20px) 20px 15px 20px; background: rgba(242, 242, 247, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 0.5px solid rgba(0,0,0,0.05); }
    .header-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .header-subtitle { font-size: 13px; font-weight: 600; color: var(--tint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .avatar-mini { width: 38px; height: 38px; border-radius: 19px; background: #E5E5EA; color: var(--tint); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }

    .screen { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: calc(env(safe-area-inset-top) + 100px) 20px calc(env(safe-area-inset-bottom) + 220px) 20px; }
    .screen.active { display: block; animation: fadeSlideUp 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards; }

    /* ========== LISTAS iOS ========== */
    .ios-list { background: var(--card); border-radius: var(--radius-md); overflow: hidden; margin-bottom: 24px; }
    .list-header { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin: 0 0 8px 12px; letter-spacing: 0.5px; }
    .list-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; position: relative; }
    .list-row:not(:last-child)::after { content: ''; position: absolute; bottom: 0; left: 60px; right: 0; height: 0.5px; background: var(--separator); }
    .row-info { display: flex; align-items: center; gap: 14px; }
    .row-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }
    .row-icon.min { background: var(--tint); } .row-icon.sab { background: var(--gold); }
    .row-title { font-size: 17px; font-weight: 500; }
    .row-desc { font-size: 14px; color: var(--text-muted); margin-top: 2px; }
    .stepper { display: flex; align-items: center; background: #F2F2F7; border-radius: 8px; padding: 2px; }
    .stepper-btn { width: 32px; height: 32px; border: none; background: transparent; font-size: 20px; color: var(--tint); font-weight: 400; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .stepper-val { font-size: 16px; font-weight: 600; width: 30px; text-align: center; }

    /* ========== MODAL SABORES ========== */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 9999; display: flex; justify-content: center; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .modal-overlay.visible { opacity: 1; pointer-events: auto; }
    .modal-card { background: white; width: 100%; border-radius: 24px 24px 0 0; padding: 24px; padding-bottom: calc(env(safe-area-inset-bottom) + 24px); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); max-height: 85vh; display: flex; flex-direction: column; }
    .modal-overlay.visible .modal-card { transform: translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 20px; font-weight: 700; }
    .sabores-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; margin-bottom: 24px; padding: 4px; }
    .sabor-btn { border: 2px solid #F2F2F7; background: #F2F2F7; border-radius: 12px; padding: 16px 8px; font-size: 13px; font-weight: 600; color: var(--text-main); cursor: pointer; transition: all 0.2s; text-align: center; }
    .sabor-btn.active { border-color: var(--gold); background: rgba(255, 149, 0, 0.1); color: var(--gold); }
    .sabor-lista-text { font-size: 13px; color: var(--gold); font-weight: 500; margin-top: 4px; line-height: 1.3; }

    /* ========== REDES SOCIALES (CONTACTO) ========== */
    .social-container { display: flex; gap: 12px; margin-top: 10px; margin-bottom: 40px; }
    .social-btn { flex: 1; background: var(--card); border-radius: var(--radius-md); padding: 16px 8px; text-align: center; text-decoration: none; color: var(--text-main); font-size: 12px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; flex-direction: column; align-items: center; gap: 8px; transition: transform 0.1s; }
    .social-btn:active { transform: scale(0.95); }
    .social-btn svg { width: 24px; height: 24px; }
    .c-wa { color: #25D366; } .c-fb { color: #1877F2; } .c-web { color: var(--tint); }

    /* ========== BOTONES Y NAVEGACIÓN ========== */
    .btn-primary { width: 100%; padding: 16px; background: var(--tint); color: white; border: none; border-radius: var(--radius-md); font-size: 17px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
    .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
    .btn-secondary { background: #E5E5EA; color: var(--tint); margin-top: 10px; }
    .btn-destructive { background: #FF3B30; color: white; margin-top: 24px; }
    .action-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: white; border-radius: var(--radius-md); margin-bottom: 24px; }
    
    .checkout-bar { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 80px); left: 20px; right: 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: var(--radius-lg); padding: 16px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; border: 0.5px solid rgba(0,0,0,0.05); }

    .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(242, 242, 247, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top: 0.5px solid rgba(0,0,0,0.1); display: flex; justify-content: space-around; height: calc(env(safe-area-inset-bottom) + 65px); padding-bottom: env(safe-area-inset-bottom); z-index: 200; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 8px; color: var(--text-muted); font-size: 10px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
    .tab-item svg { margin-bottom: 4px; transition: transform 0.2s; }
    .tab-item.active { color: var(--tint); }
    .tab-item.active svg { transform: scale(1.1); }

    #toast { display: none; position: fixed; top: calc(env(safe-area-inset-top) + 16px); left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); color: white; padding: 12px 24px; border-radius: 100px; font-weight: 500; font-size: 15px; z-index: 9999; align-items: center; gap: 8px; animation: fadeSlideUp 0.3s; }
  </style>
</head>
<body>

  <div id="toast"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> <span id="toast-msg">Mensaje</span></div>

  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>
        </svg>
      </div>
      <h1 class="auth-title">AguaBol</h1>
      <p class="auth-subtitle" id="auth-instruction">Ingresa tu WhatsApp para acceder a tu historial y pedidos.</p>
      <input type="tel" id="auth-phone" class="auth-input" placeholder="Número de teléfono">
      <div id="registro-campos">
        <input type="text" id="auth-name" class="auth-input" placeholder="Nombre completo">
        <input type="text" id="auth-address" class="auth-input" placeholder="Dirección de entrega">
      </div>
      <button class="btn-primary" id="btn-auth" onclick="procesarAcceso()">Continuar</button>
    </div>
  </div>

  <div id="main-app">
    
    <div class="glass-header">
      <div>
        <div class="header-subtitle" id="header-fecha">Hacer Pedido</div>
        <div class="header-title" id="header-titulo">Inicio</div>
      </div>
      <div class="avatar-mini" id="header-avatar">A</div>
    </div>

    <div id="screen-pedido" class="screen active">
      <div id="catalogo-container">
        <div class="list-header">CATÁLOGO DE PRODUCTOS</div>
        <div class="ios-list">
          <div class="list-row">
            <div class="row-info">
              <div class="row-icon min">A</div>
              <div>
                <div class="row-title">Agua Mineral</div>
                <div class="row-desc">Recarga botellón 20L</div>
              </div>
            </div>
            <div class="stepper">
              <button class="stepper-btn" onclick="changeQty('qty-min', -1)">-</button>
              <div class="stepper-val" id="qty-min">1</div>
              <button class="stepper-btn" onclick="changeQty('qty-min', 1)">+</button>
            </div>
          </div>
          <div class="list-row" style="flex-direction: column; align-items: stretch;">
            <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
              <div class="row-info">
                <div class="row-icon sab">S</div>
                <div>
                  <div class="row-title">Agua Saborizada</div>
                  <div class="row-desc">Botellón 20L preparado</div>
                </div>
              </div>
              <div class="stepper">
                <button class="stepper-btn" onclick="restarSabor()">-</button>
                <div class="stepper-val" id="qty-sab">0</div>
                <button class="stepper-btn" onclick="abrirModalSabores()">+</button>
              </div>
            </div>
            <div id="sabores-elegidos-texto" class="sabor-lista-text" style="margin-top: 8px; margin-left: 46px;"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="screen-perfil" class="screen">
      <div class="list-header">DATOS PERSONALES</div>
      <div class="ios-list" style="margin-bottom: 12px;">
        <div class="list-row"><input type="text" id="perfil-nombre" class="auth-input" style="margin:0; padding:0; background:transparent; box-shadow:none;" placeholder="Nombre"></div>
        <div class="list-row"><input type="text" id="perfil-dir" class="auth-input" style="margin:0; padding:0; background:transparent; box-shadow:none;" placeholder="Dirección"></div>
      </div>
      <button class="btn-primary" onclick="guardarPerfil()" style="margin-bottom: 30px;">Actualizar Datos</button>

      <div class="list-header" style="margin-top: 24px;">CONTACTO OFICIAL</div>
      <div class="social-container">
        <a href="https://wa.me/584241234567" target="_blank" class="social-btn">
          <svg class="c-wa" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          WhatsApp
        </a>
        <a href="https://facebook.com/tupagina" target="_blank" class="social-btn">
          <svg class="c-fb" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path>
          </svg>
          Facebook
        </a>
        <a href="https://aguabol.com" target="_blank" class="social-btn">
          <svg class="c-web" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
          Sitio Web
        </a>
      </div>

      <button class="btn-destructive" onclick="cerrarSesion()" style="width: 100%; border-radius: var(--radius-md); padding: 16px; font-weight: 600; border: none; font-size: 16px; margin-bottom: 50px;">Cerrar Sesión</button>
    </div>

    <div class="tab-bar">
      <div class="tab-item active" onclick="switchTab('pedido', 'Inicio')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Inicio
      </div>
      <div class="tab-item" onclick="switchTab('perfil', 'Mi Perfil')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        Perfil
      </div>
    </div>
  </div>

  <div id="modal-sabores" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">Elige un Sabor</div>
        <button onclick="cerrarModalSabores()" style="background: none; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer;">&times;</button>
      </div>
      <div class="sabores-grid" id="grid-sabores">
        <button class="sabor-btn" onclick="seleccionarSabor('Fresa', this)">Fresa</button>
        <button class="sabor-btn" onclick="seleccionarSabor('Limón', this)">Limón</button>
        <button class="sabor-btn" onclick="seleccionarSabor('Naranja', this)">Naranja</button>
        <button class="sabor-btn" onclick="seleccionarSabor('Parchita', this)">Parchita</button>
        <button class="sabor-btn" onclick="seleccionarSabor('Piña', this)">Piña</button>
        <button class="sabor-btn" onclick="seleccionarSabor('Mora', this)">Mora</button>
        <button class="sabor-btn" onclick="seleccionarSabor('Manzana', this)">Manzana</button>
        <button class="sabor-btn" onclick="seleccionarSabor('Uva', this)">Uva</button>
      </div>
      <button class="btn-primary" onclick="confirmarSabor()">Confirmar Sabor</button>
    </div>
  </div>

  <script>
    // ===== 1. CREDENCIALES SUPABASE (¡Pega tus Keys aquí!) =====
    const SUPABASE_URL = 'URL_AQUI';
    const SUPABASE_KEY = 'KEY_AQUI';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== 2. VARIABLES GLOBALES =====
    let usuarioActual = null;
    let listaSaboresSeleccionados = [];
    let saborTemporalmenteSeleccionado = null;

    // ===== 3. NAVEGACIÓN Y TABS =====
    function switchTab(id, titulo) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + id).classList.add('active');
      document.getElementById('header-titulo').innerText = titulo;
      
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    // ===== 4. LÓGICA DE SABORES =====
    function abrirModalSabores() {
      document.getElementById('modal-sabores').classList.add('visible');
      saborTemporalmenteSeleccionado = null;
      document.querySelectorAll('.sabor-btn').forEach(btn => btn.classList.remove('active'));
    }

    function cerrarModalSabores() {
      document.getElementById('modal-sabores').classList.remove('visible');
    }

    function seleccionarSabor(sabor, elemento) {
      saborTemporalmenteSeleccionado = sabor;
      document.querySelectorAll('.sabor-btn').forEach(btn => btn.classList.remove('active'));
      elemento.classList.add('active');
    }

    function confirmarSabor() {
      if (!saborTemporalmenteSeleccionado) {
        showToast("Por favor selecciona un sabor");
        return;
      }
      
      listaSaboresSeleccionados.push(saborTemporalmenteSeleccionado);
      
      let qtySab = document.getElementById('qty-sab');
      if (qtySab) {
         let actual = parseInt(qtySab.innerText) || 0;
         qtySab.innerText = actual + 1;
      }
      
      actualizarTextoSabores();
      cerrarModalSabores();
      showToast(`Sabor ${saborTemporalmenteSeleccionado} agregado`);
    }

    function restarSabor() {
      let qtySab = document.getElementById('qty-sab');
      let actual = parseInt(qtySab.innerText) || 0;
      
      if (actual > 0 && listaSaboresSeleccionados.length > 0) {
        listaSaboresSeleccionados.pop();
        qtySab.innerText = actual - 1;
        actualizarTextoSabores();
      }
    }

    function actualizarTextoSabores() {
      let contenedorTexto = document.getElementById('sabores-elegidos-texto');
      if (contenedorTexto) {
        if (listaSaboresSeleccionados.length > 0) {
          contenedorTexto.innerText = "Sabores: " + listaSaboresSeleccionados.join(', ');
        } else {
          contenedorTexto.innerText = "";
        }
      }
    }

    function changeQty(id, delta) {
      let el = document.getElementById(id);
      let v = parseInt(el.innerText) + delta;
      if (v < 0) v = 0;
      el.innerText = v;
    }

    // ===== 5. LÓGICA PUSH WEB (SERVICE WORKERS) =====
    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) { outputArray[i] = rawData.charCodeAt(i); }
      return outputArray;
    }

    async function registrarPushWeb() {
      try {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
        
        let permiso = await Notification.requestPermission();
        if (permiso !== 'granted') return;

        let registration = await navigator.serviceWorker.register('/sw.js');
        let subscription = await registration.pushManager.getSubscription();
        
        if (!subscription) {
          const publicVapidKey = 'BDSv-QbrjeZnh4uWUGgSZ09GEb5Pk6jVAeWGlSieuMQzORmfhc_0K3cpp99TumQMOmF5ggY7lI0lgD0tX7-HJoQ';
          subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(publicVapidKey)
          });
        }

        if (usuarioActual && usuarioActual.id) {
          const { error } = await db.from('dispositivos').upsert({ 
            user_id: usuarioActual.id, 
            fcm_token: JSON.stringify(subscription), 
            plataforma: 'web', 
            updated_at: new Date().toISOString() 
          }, { onConflict: 'user_id' });
          
          if(!error) console.log("Push listo");
        }
      } catch (error) {
        console.error("Error Push Web:", error);
      }
    }

    // ===== 6. UTILIDADES =====
    function showToast(msg, isError=false) {
      let t = document.getElementById('toast');
      document.getElementById('toast-msg').innerText = msg;
      t.style.background = isError ? 'rgba(255,59,48,0.9)' : 'rgba(0,0,0,0.8)';
      t.style.display = 'flex';
      setTimeout(() => t.style.display='none', 3000);
    }
  </script>
</body>
</html>
